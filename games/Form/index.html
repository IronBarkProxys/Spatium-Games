<!DOCTYPE html>
<html>
<head>
  <title>Form Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #231f20;
    }

    #gameContainer {
      width: 100vw;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<div id="gameContainer"></div>

<script>
  const formURL = "https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true";

  function loadForm() {
    const iframe = document.createElement("iframe");
    iframe.src = formURL;
    document.getElementById("gameContainer").appendChild(iframe);
  }

  // auto start like a game
  window.onload = loadForm;
</script>

</body>
</html>
