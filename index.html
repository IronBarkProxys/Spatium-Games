<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatium - Play Free Games</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/gn-math/covers@main/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/gn-math/covers@main/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loader"></div>
        <p id="loadingText">Loading games... (0/0)</p>
    </div>

    <!-- Particles Background -->
    <canvas id="particles"></canvas>

    <!-- Header -->
    <header class="backdrop-blur-md">
        <div class="header-content">
            <div class="logo">Spatium</div>
            <div class="search-container">
                <input
                    type="text"
                    id="searchBar"
                    placeholder="Search games..."
                    autocomplete="off"
                >
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Featured Games Section -->
        <section>
            <h1 class="title">Featured Games</h1>
            <div id="featuredZones" class="zone-container"></div>
        </section>

        <!-- All Games Section -->
        <section>
            <h1 class="title">All Games</h1>
            <div id="allZones" class="zone-container"></div>
        </section>
    </main>

    <!-- Game Viewer -->
    <div id="zoneViewer">
        <div class="zone-header">
            <h2 id="zoneName">Game Title</h2>
            <div class="zone-controls">
                <button onclick="fullscreenZone()">Fullscreen</button>
                <button onclick="closeZone()">Close</button>
            </div>
        </div>
        <iframe id="zoneFrame" allowfullscreen></iframe>
    </div>

    <!-- Online Counter -->
    <div id="onlineCounter">Online: 23</div>

    <script src="script.js"></script>
</body>
</html>
