</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loader"></div>
        <p id="loadingText">Loading games... (0/0)</p>
    </div>
    <!-- Particles Background -->
    <canvas id="particles"></canvas>

    <!-- Header -->
    <header>
        <div class="header-upper">
            <div class="logo" onclick="location.reload()">Spatium</div>
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" id="searchBar" placeholder="Search for games..." oninput="filterGames()">
            </div>
            <div class="header-actions">
                <button class="btn-icon" onclick="location.reload()" title="Refresh">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                        <path d="M21 3v5h-5"/>
                        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                        <path d="M8 16H3v5"/>
                    </svg>
                </button>
                <button class="btn-icon" onclick="openSettings()" title="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>
       
        <div class="nav-bar">
            <div class="nav-content" id="navContent">
                <div class="nav-link active" onclick="switchView('all')">All Games</div>
            </div>
        </div>
    </header>

    <main id="mainContainer">
        <div id="modernView">
            <!-- Featured Slider -->
            <div class="swiper featured-slider">
                <div class="swiper-wrapper" id="heroWrapper"></div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
            <div style="display: flex; justify-content: center; margin: 2rem 0;">
                <button onclick="document.getElementById('allGamesGrid').scrollIntoView({behavior: 'smooth'})"
                        style="background: linear-gradient(135deg, #f365ac, #ff8ac4); border: none; color: white; padding: 1rem 2rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer;">
                    View All Games
                </button>
            </div>
            <!-- Featured -->
            <div class="section-header">
                <div class="section-title" onclick="toggleSection('featuredGrid', this)" style="cursor: pointer;">
                    Featured Games
                    <svg class="collapse-arrow" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m6 9 6 6 6-6"/>
                    </svg>
                </div>
            </div>
            <div class="grid-layout" id="featuredGrid"></div>
            <!-- All Games -->
            <div class="section-header">
                <div class="section-title" onclick="toggleSection('allGamesGrid', this)" style="cursor: pointer;">
                    All Games
                    <svg class="collapse-arrow" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m6 9 6 6 6-6"/>
                    </svg>
                </div>
                <select id="sortOptions" onchange="sortZones()">
                    <option value="name">Name (A-Z)</option>
                    <option value="id">ID (Newest)</option>
                </select>
            </div>
            <div class="grid-layout" id="allGamesGrid"></div>
        </div>
    </main>

    <!-- Game Viewer -->
    <div id="zoneViewer">
        <div class="zone-header">
            <div class="zone-title">
                <h2 id="zoneName">Game Title</h2>
            </div>
            <div class="zone-controls">
                <button onclick="fullscreenZone()">Fullscreen</button>
                <button onclick="closeZone()">Close</button>
            </div>
        </div>
        <iframe id="zoneFrame" allowfullscreen></iframe>
    </div>

    <!-- ==================== SETTINGS MODAL ==================== -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>

            <div class="modal-body">
                <!-- Particles -->
                <div class="setting-row">
                    <label class="toggle-label">
                        <input type="checkbox" id="particlesToggle" checked onchange="toggleParticles(this.checked)">
                        Enable background particles
                    </label>
                </div>

                <!-- Open in about:blank -->
                <div class="setting-row">
                    <button onclick="openInAboutBlank()" class="modal-btn">
                        🌐 Open site in about:blank (new tab)
                    </button>
                </div>

                <!-- Change Title -->
                <div class="setting-row">
                    <label>Site Title (Tab Name)</label>
                    <input type="text" id="siteTitleInput" placeholder="Spatium - Play Free Games" style="width:100%; padding:12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text);">
                    <button onclick="changeSiteTitle()" class="modal-btn accent-btn" style="margin-top:8px;">Save Title</button>
                </div>

                <!-- Upload Favicon -->
                <div class="setting-row">
                    <label>Custom Favicon</label>
                    <input type="file" id="faviconUpload" accept="image/*" style="display:block; width:100%; margin:8px 0;">
                    <button onclick="uploadFavicon()" class="modal-btn">Upload Favicon</button>
                </div>

                <!-- Themes -->
                <div class="setting-row">
                    <label>Theme</label>
                    <div class="theme-grid">
                        <div class="theme-option" data-theme="space" onclick="setTheme('space')">Space</div>
                        <div class="theme-option" data-theme="aquatic" onclick="setTheme('aquatic')">Aquatic</div>
                        <div class="theme-option" data-theme="cherry" onclick="setTheme('cherry')">Cherry Blossom</div>
                        <div class="theme-option" data-theme="swamp" onclick="setTheme('swamp')">Swamp</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
